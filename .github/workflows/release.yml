name: Build & Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2 | tr -d '\r')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: chmod +x gradlew && ./gradlew build

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # 收集各分类的 commit
          FEATS=""
          FIXES=""
          REFACTORS=""
          PERFS=""
          OTHERS=""

          while IFS= read -r line; do
            hash=$(echo "$line" | cut -d'|' -f1)
            msg=$(echo "$line" | cut -d'|' -f2-)

            # 解析 type(scope): desc 或 type: desc
            if echo "$msg" | grep -qE '^[a-z]+(\(.*\))?!?:'; then
              type=$(echo "$msg" | sed -E 's/^([a-z]+)(\(.*\))?!?:.*/\1/')
              rest=$(echo "$msg" | sed -E 's/^[a-z]+(\(.*\))?!?:\s*//')
              scope=$(echo "$msg" | sed -nE 's/^[a-z]+\(([^)]+)\)!?:.*/\1/p')
              if [ -n "$scope" ]; then
                entry="- **${scope}:** ${rest} (\`${hash}\`)"
              else
                entry="- ${rest} (\`${hash}\`)"
              fi
            else
              type="other"
              entry="- ${msg} (\`${hash}\`)"
            fi

            case "$type" in
              feat)     FEATS="${FEATS}${entry}\n" ;;
              fix)      FIXES="${FIXES}${entry}\n" ;;
              refactor) REFACTORS="${REFACTORS}${entry}\n" ;;
              perf)     PERFS="${PERFS}${entry}\n" ;;
              *)        OTHERS="${OTHERS}${entry}\n" ;;
            esac
          done < <(git log --pretty=format:"%h|%s" $RANGE)

          # 组装 Release 说明
          BODY=""
          if [ -n "$FEATS" ]; then
            BODY="${BODY}### Features\n${FEATS}\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Bug Fixes\n${FIXES}\n"
          fi
          if [ -n "$REFACTORS" ]; then
            BODY="${BODY}### Refactors\n${REFACTORS}\n"
          fi
          if [ -n "$PERFS" ]; then
            BODY="${BODY}### Performance\n${PERFS}\n"
          fi
          if [ -n "$OTHERS" ]; then
            BODY="${BODY}### Others\n${OTHERS}\n"
          fi

          {
            echo "body<<EOF"
            echo -e "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing release and tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # 删除已有的 Release，如果存在则一并清理同名 tag，方便同版本重新发布
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/${TAG}" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TextDisplayMenu ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: build/libs/TextDisplayMenu-*.jar
          make_latest: true
