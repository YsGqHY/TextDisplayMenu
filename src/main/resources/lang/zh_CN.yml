# TextDisplayMenu 简体中文语言文件
# TabooLib I18n 只按顶层 node 查找语言节点，因此本文件采用扁平化 key。
# prefix 是 sendInfo/sendWarn/sendError 等语言发送的统一前缀。

prefix: '&8[&bTextDisplayMenu&8]&r'
prefix-info: '&8[&bTextDisplayMenu&8]&r'
prefix-warn: '&8[&eTextDisplayMenu&8]&r'
prefix-error: '&8[&cTextDisplayMenu&8]&r'

